<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>init commit — HackerRank Crew GDL</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@font-face {
  font-family: 'Satoshi';
  src: url('fonts/Satoshi-Variable.woff2') format('woff2');
  font-weight: 100 900;
}
@font-face {
  font-family: 'Departure Mono';
  src: url('fonts/DepartureMono-Regular.woff2') format('woff2');
  font-weight: 400;
}
</style>
<style>
:root {
  --green: #05C770;
  --black: #141419;
  --terrain: #003333;
  --sky: #73D3FB;
  --white: #FFFFFF;
}
body {
  background: #0e0e12;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  font-family: 'Satoshi', sans-serif;
}
.flyer {
  width: 864px;
  height: 1080px;
  background: var(--black);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.grid-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(5,199,112,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(5,199,112,0.06) 1px, transparent 1px);
  background-size: 48px 48px;
  z-index: 0;
}
.glow {
  position: absolute;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(5,199,112,0.18) 0%, transparent 70%);
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 0;
  animation: pulse 6s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.08); }
}
.tag {
  font-family: 'Departure Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--green);
}
.profile-ring {
  width: 340px;
  height: 340px;
  border-radius: 50%;
  border: 2px solid rgba(5,199,112,0.4);
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 60px rgba(5,199,112,0.2);
}
.profile-ring img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(0.3);
}
.badge {
  background: var(--green);
  color: var(--black);
  font-family: 'Departure Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 2px;
  font-weight: 700;
}
.divider {
  width: 40px;
  height: 2px;
  background: var(--green);
}
</style>
</head>
<body>
<div class="flyer">
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <!-- Header: logo + community -->
  <div class="relative z-10 flex items-center gap-3 px-10 pt-10">
    <img src="../hackerrank/logos/Logo Light Wide.svg" style="height:32px;">
    <span style="color:rgba(255,255,255,0.3); font-size:20px; font-weight:300;">|</span>
    <span class="tag" style="font-size:30px; letter-spacing:0.15em;">Crew GDL</span>
  </div>

  <!-- Eyebrow -->
  <div class="relative z-10 px-10 mt-10">
    <span class="tag">> Skills over pedigree</span>
  </div>

  <!-- Title -->
  <div class="relative z-10 px-10 mt-6">
    <h1 class="font-bold leading-none text-white" style="font-size:64px; line-height:1.05;">
      Cómo construir<br>un Resume de<br><span style="color:var(--green);">clase mundial</span>
    </h1>
  </div>

  <!-- Subtitle -->
  <div class="relative z-10 px-10 mt-5">
    <div class="divider mb-4"></div>
    <p class="text-gray-400 text-lg" style="max-width:480px; font-size:18px; line-height:1.6;">
      La guía práctica para que tu CV hable por ti antes de la primera entrevista.
    </p>
  </div>



  <!-- Speaker + photo -->
  <div class="relative z-10 flex items-end px-10 mt-auto mb-0" style="gap:40px;">
    <div class="profile-ring">
      <img src="../bigTech/images/diegoGoogle.jpeg">
    </div>
    <div class="pb-6">
      <span class="badge mb-3 inline-block">Speaker</span>
      <p class="text-white font-bold text-3xl mt-2">Diego Rivera</p>
      <p class="tag mt-1" style="color:#73D3FB;">Fullstack Engineer</p>
    </div>
  </div>

  <!-- Fecha / lugar — justo arriba del footer -->
  <div class="relative z-10 px-10 mt-auto mb-0 flex items-center justify-between" style="padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.08);">
    <div class="flex gap-2 items-center">
      <span class="tag" style="color:var(--green);">Miércoles 25 / 03</span>
      <span class="tag" style="color:rgba(255,255,255,0.3);">·</span>
      <span class="tag" style="color:rgba(255,255,255,0.6);">3:00 – 5:00 PM</span>
    </div>
    <div class="flex gap-2 items-center">
      <span class="tag" style="color:rgba(255,255,255,0.6);">Auditorio Antonio Alatorre</span>
      <span class="tag" style="color:rgba(255,255,255,0.3);">·</span>
      <span class="tag" style="color:rgba(255,255,255,0.6);">Módulo O, CUCEI</span>
    </div>
  </div>

  <!-- Footer bar: logos institucionales -->
  <div class="relative z-10" style="background:rgba(255,255,255,0.04);">
    <div class="flex items-center justify-end gap-8 px-10 py-5">
      <img src="../div-tic/DIVTIC - BLANCO.png" style="height:64px; opacity:0.95;">
    </div>
  </div>

</div>
</body>
</html>
